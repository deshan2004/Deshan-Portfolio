<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details | Deshan Siriwardhana</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 80px; }
    .project-header { background: #11181c; border-radius: 2rem; padding: 2.5rem; border: 1px solid #2c7da0; margin-bottom: 2rem; }
    .tech-pill { background: #1e2a3a; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.85rem; border: 1px solid #2c7da0; color: #a5f3fc; }
    .feature-item { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem; color: #cbd5e1; }
    .feature-item i { color: #ffb347; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" style="color: #6ab0de; text-decoration: none; display: inline-block; margin-bottom: 2rem;">
      <i class="fas fa-arrow-left"></i> Back to Portfolio
    </a>
    
    <div id="projectDetailContent">
      </div>
  </div>

  <script src="script.js"></script>
  <script>
    // URL eken project ID eka ganna (e.g., project.html?id=educonnect-lms)
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');
    const project = projectsData.find(p => p.id === projectId);

    if (project) {
      document.title = `${project.name} | Deshan Siriwardhana`;
      const content = document.getElementById('projectDetailContent');
      content.innerHTML = `
        <div class="project-header">
          <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">${project.name}</h1>
          <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem;">
            ${project.tech.map(t => `<span class="tech-pill">${t}</span>`).join('')}
          </div>
          <p style="font-size: 1.2rem; color: #cbd5e1;">${project.fullDesc}</p>
        </div>
        
        <div style="background: #11181c; border-radius: 1.5rem; padding: 2rem; border: 1px solid #2c3e44;">
          <h2 style="margin-bottom: 1.5rem; color: #6ab0de;">Key Features</h2>
          <div>
            ${project.features.map(f => `<div class="feature-item"><i class="fas fa-check-circle"></i> ${f}</div>`).join('')}
          </div>
          <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <a href="${project.repo}" target="_blank" class="btn"><i class="fab fa-github"></i> GitHub Repo</a>
            ${project.liveDemo !== '#' ? `<a href="${project.liveDemo}" target="_blank" class="btn btn-outline">Live Demo</a>` : ''}
          </div>
        </div>
      `;
    } else {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
